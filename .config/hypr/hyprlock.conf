general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = /tmp/lock_bg.png
    blur_passes = 3
    blur_size = 7
    noise = 0.012
    contrast = 1.2
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# ── Clock ──────────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +%H:%M)</b>"
    color = rgba(dee4deff)
    font_size = 90
    font_family = JetBrains Mono Bold
    position = 0, 160
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(0a0f0dcc)
}

# ── Date ───────────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A, %d %B')"
    color = rgba(bfc9c2cc)
    font_size = 18
    font_family = JetBrains Mono
    position = 0, 56
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0a0f0dcc)
}

# ── Input field ────────────────────────────────────────────────────────────────
input-field {
    monitor =
    size = 340, 54
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.22
    dots_center = true
    dots_rounding = -1

    outer_color     = rgba(8cd5b5bb)
    inner_color     = rgba(1b211ef0)
    font_color      = rgba(dee4deff)

    fade_on_empty   = true
    fade_timeout    = 1500
    placeholder_text = <span foreground="##bfc9c2">󰌾  Password...</span>
    hide_input      = false
    rounding        = 27

    check_color     = rgba(8cd5b5ff)
    fail_color      = rgba(ffb4abff)
    fail_text       = <i>Wrong password ($ATTEMPTS)</i>
    capslock_color  = rgba(a2ced8ff)

    position = 0, -60
    halign   = center
    valign   = center
}
